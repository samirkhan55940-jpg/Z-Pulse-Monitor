name: Build Z+3 Zombie Ultimate Pro (Master Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Project Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/zombie
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/cpp

      - name: 3. Setup Android System Files (RAM Fix)
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZZombieUltimate"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: 4. Write App Build Configuration (Clash Fix)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.zombie'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.zombie"
                  minSdk 24
                  targetSdk 34
                  versionCode 24
                  versionName "24-Mission-Pro"
                  externalNativeBuild { cmake { cppFlags "" } }
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
              packagingOptions {
                  pickFirst 'META-INF/**'
                  pickFirst '**/*.kotlin_module'
              }
          }
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: 5. Write 3D Weather Engine (C++)
        run: |
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("zombie_engine")
          add_library(zombie_engine SHARED native-lib.cpp)
          find_library(log-lib log)
          find_library(gles-lib GLESv3)
          target_link_libraries(zombie_engine ${log-lib} ${gles-lib})
          EOF

          cat << 'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <GLES3/gl3.h>
          extern "C" JNIEXPORT void JNICALL
          Java_com_zeeshan_zombie_MainActivity_update3DEnvironment(JNIEnv* env, jobject obj, jint type) {
              if (type == 1) glClearColor(0.1f, 0.1f, 0.3f, 1.0f); // Rain
              else if (type == 2) glClearColor(0.4f, 0.1f, 0.0f, 1.0f); // Heat
              else glClearColor(0.7f, 0.7f, 0.9f, 1.0f); // Snow
              glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);
          }
          EOF

      - name: 6. Write Strings & Manifest (Permissions Added)
        run: |
          echo '<resources><string name="app_name">Z+³ Zombie Pro 24</string></resources>' > app/src/main/res/values/strings.xml
          
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <application android:label="Z+³ Zombie Pro" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 7. Write MainActivity.java (THE COMPLETE LOGIC)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/zombie/MainActivity.java
          package com.zeeshan.zombie;

          import android.Manifest;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends AppCompatActivity {
              private int dollars = 0, mission = 1, kills = 0, health = 100;
              private boolean hasShotgun = false;
              private TextView hud, weatherText;
              private SharedPreferences prefs;

              static { System.loadLibrary("zombie_engine"); }
              public native void update3DEnvironment(int type);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = getSharedPreferences("ZSave", MODE_PRIVATE);
                  dollars = prefs.getInt("dollars", 0);
                  mission = prefs.getInt("mission", 1);
                  hasShotgun = prefs.getBoolean("shotgun", false);

                  // Ijaajat (Permission) Request System
                  checkGamePermissions();

                  RelativeLayout root = new RelativeLayout(this);
                  root.setBackgroundColor(Color.BLACK);

                  weatherText = new TextView(this);
                  weatherText.setTextColor(Color.CYAN);
                  root.addView(weatherText);

                  hud = new TextView(this);
                  hud.setTextColor(Color.YELLOW);
                  hud.setTextSize(18);
                  hud.setPadding(30, 100, 30, 30);
                  updateHUD();
                  root.addView(hud);

                  Button btnShoot = new Button(this);
                  btnShoot.setText("🔥 OPEN FIRE");
                  btnShoot.setBackgroundColor(Color.RED);
                  btnShoot.setTextColor(Color.WHITE);
                  setupButton(btnShoot, 300);
                  root.addView(btnShoot);

                  Button btnShop = new Button(this);
                  btnShop.setText(hasShotgun ? "SHOTGUN EQUIPPED" : "BUY SHOTGUN ($10)");
                  btnShop.setBackgroundColor(Color.BLUE);
                  btnShop.setTextColor(Color.WHITE);
                  setupButton(btnShop, 100);
                  root.addView(btnShop);

                  btnShoot.setOnClickListener(v -> {
                      if(health <= 0) {
                          Toast.makeText(this, "You Died! Mission Restart.", Toast.LENGTH_SHORT).show();
                          health = 100; updateHUD(); return;
                      }
                      
                      kills += (hasShotgun ? 2 : 1);
                      if(mission >= 5) {
                          health -= (mission > 15 ? 5 : 2); // Harder levels = More damage
                          Toast.makeText(this, "Zombies are shooting back!", Toast.LENGTH_SHORT).show();
                      }

                      if(kills >= (mission * 4)) completeMission();
                      updateHUD();
                      applyWeather();
                  });

                  btnShop.setOnClickListener(v -> {
                      if(!hasShotgun && dollars >= 10) {
                          dollars -= 10; hasShotgun = true;
                          save(); btnShop.setText("SHOTGUN EQUIPPED"); updateHUD();
                      }
                  });

                  setContentView(root);
                  applyWeather();
              }

              private void checkGamePermissions() {
                  String[] permissions = {Manifest.permission.CAMERA, Manifest.permission.RECORD_AUDIO};
                  if (ContextCompat.checkSelfPermission(this, permissions[0]) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, permissions, 100);
                  }
              }

              private void setupButton(Button b, int bottom) {
                  RelativeLayout.LayoutParams lp = new RelativeLayout.LayoutParams(-1, 150);
                  lp.addRule(RelativeLayout.ALIGN_PARENT_BOTTOM);
                  lp.setMargins(50, 0, 50, bottom);
                  b.setLayoutParams(lp);
              }

              private void applyWeather() {
                  int t;
                  if (mission <= 8) { t = 1; weatherText.setText("MAP: RAINY FACTORY"); }
                  else if (mission <= 16) { t = 2; weatherText.setText("MAP: HOT DESERT"); }
                  else { t = 3; weatherText.setText("MAP: SNOWY MOUNTAIN"); }
                  update3DEnvironment(t);
              }

              private void completeMission() {
                  if(mission < 24) {
                      dollars += 2; mission++; kills = 0;
                      save();
                      Toast.makeText(this, "Mission Clear! +$2", Toast.LENGTH_SHORT).show();
                  }
              }

              private void updateHUD() {
                  hud.setText("MISSION: " + mission + "/24\nHEALTH: " + health + "%\nCASH: $" + dollars + "\nGUN: " + (hasShotgun ? "SHOTGUN" : "PISTOL"));
              }

              private void save() {
                  prefs.edit().putInt("dollars", dollars).putInt("mission", mission).putBoolean("shotgun", hasShotgun).apply();
              }
          }
          EOF

      - name: 8. Build Ultimate Game APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug --info

      - name: 9. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus3-Zombie-Ultimate-Pro
          path: app/build/outputs/apk/debug/*.apk
