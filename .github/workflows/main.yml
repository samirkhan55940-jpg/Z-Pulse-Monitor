name: Z+3 AI Voice Pro Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Project Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/pulse
          mkdir -p app/src/main/res/values

      - name: 3. Setup Project Configuration
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZPulseAIVoice"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

      - name: 4. Write App build.gradle (Dependencies Fixed)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.pulse'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.pulse"
                  minSdk 24
                  targetSdk 34
                  versionCode 5
                  versionName "Z+3 AI Voice Pro"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation "androidx.camera:camera-camera2:1.3.0"
              implementation "androidx.camera:camera-lifecycle:1.3.0"
              implementation "androidx.camera:camera-view:1.3.0"
              implementation 'com.google.guava:guava:31.1-android'
          }
          EOF

      - name: 5. Write AndroidManifest.xml
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.FLASHLIGHT" />
              <uses-feature android:name="android.hardware.camera" />
              <uses-feature android:name="android.hardware.camera.flash" />
              
              <application android:label="Z+³ AI Voice" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 6. Write MainActivity.java (AI + Voice Logic)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/pulse/MainActivity.java
          package com.zeeshan.pulse;

          import android.Manifest;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.camera.core.*;
          import androidx.camera.lifecycle.ProcessCameraProvider;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.google.common.util.concurrent.ListenableFuture;
          import java.nio.ByteBuffer;
          import java.text.SimpleDateFormat;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private TextView bpmText, aiAdviceText;
              private ArrayList<Long> beats = new ArrayList<>();
              private double lastRedAvg = 0;
              private SharedPreferences sharedPrefs;
              private TextToSpeech tts;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  sharedPrefs = getSharedPreferences("PulseHistory", MODE_PRIVATE);
                  
                  // Voice AI Setup (Hindi/Urdu style)
                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(new Locale("hi", "IN"));
                      }
                  });
                  
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(40, 40, 40, 40);

                  TextView aiTitle = new TextView(this);
                  aiTitle.setText("--- Z+³ AI VOICE BRAIN ---");
                  aiTitle.setTextColor(Color.CYAN);
                  aiTitle.setGravity(Gravity.CENTER);

                  bpmText = new TextView(this);
                  bpmText.setText("--");
                  bpmText.setTextColor(Color.parseColor("#22C55E"));
                  bpmText.setTextSize(90);
                  
                  aiAdviceText = new TextView(this);
                  aiAdviceText.setText("AI: Scan start karein...");
                  aiAdviceText.setTextColor(Color.YELLOW);
                  aiAdviceText.setGravity(Gravity.CENTER);
                  aiAdviceText.setPadding(0, 20, 0, 50);

                  Button btnStart = new Button(this);
                  btnStart.setText("START VOICE SCAN");
                  btnStart.setBackgroundColor(Color.RED);
                  btnStart.setTextColor(Color.WHITE);

                  root.addView(aiTitle);
                  root.addView(bpmText);
                  root.addView(aiAdviceText);
                  root.addView(btnStart);
                  setContentView(root);

                  btnStart.setOnClickListener(v -> {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 10);
                      } else { 
                          startCamera(); 
                          speakOut("Scan shuru ho raha hai, ungli camera par rakhein");
                      }
                  });
              }

              private void startCamera() {
                  ListenableFuture<ProcessCameraProvider> cameraProviderFuture = ProcessCameraProvider.getInstance(this);
                  cameraProviderFuture.addListener(() -> {
                      try {
                          ProcessCameraProvider cameraProvider = cameraProviderFuture.get();
                          ImageAnalysis analysis = new ImageAnalysis.Builder()
                                  .setBackpressureStrategy(ImageAnalysis.STRATEGY_KEEP_ONLY_LATEST).build();
                          analysis.setAnalyzer(ContextCompat.getMainExecutor(this), image -> {
                              analyzeImage(image); image.close();
                          });
                          Camera cam = cameraProvider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, analysis);
                          cam.getCameraControl().enableTorch(true);
                      } catch (Exception e) {}
                  }, ContextCompat.getMainExecutor(this));
              }

              private void analyzeImage(ImageProxy image) {
                  ByteBuffer buffer = image.getPlanes()[0].getBuffer();
                  byte[] data = new byte[buffer.remaining()];
                  buffer.get(data);
                  double redAvg = 0;
                  for (byte b : data) redAvg += (b & 0xFF);
                  redAvg /= data.length;

                  if (lastRedAvg > 0 && redAvg < lastRedAvg * 0.998) {
                      long now = System.currentTimeMillis();
                      if (beats.isEmpty() || now - beats.get(beats.size()-1) > 500) {
                          beats.add(now);
                          if (beats.size() > 8) {
                              long diff = beats.get(beats.size()-1) - beats.get(beats.size()-8);
                              int bpm = (int) (60000 * 7 / diff);
                              runOnUiThread(() -> {
                                  bpmText.setText(String.valueOf(bpm));
                                  if(beats.size() == 10) { updateAIAdvice(bpm); }
                              });
                          }
                      }
                  }
                  lastRedAvg = redAvg;
              }

              private void updateAIAdvice(int bpm) {
                  String advice;
                  if (bpm < 60) advice = "Aapki dharkan slow hai.";
                  else if (bpm <= 100) advice = "Aap bilkul fit hain, good job!";
                  else advice = "Dharkan tez hai, thoda paani pee lein.";
                  
                  aiAdviceText.setText("AI: " + advice);
                  speakOut(advice);
              }

              private void speakOut(String text) {
                  if(tts != null) {
                      tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
                  }
              }
              
              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  super.onDestroy();
              }
          }
          EOF

      - name: 7. Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Upload AI Voice APK
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus3-AI-Voice-APK
          path: app/build/outputs/apk/debug/*.apk
