name: Build Zeeshan Husain Chat (Premium Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Premium App Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/chat/db
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/drawable
          
          # 1. Gradle Config (Powerful & Optimized)
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.chat'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.chat'
                  minSdk 26
                  targetSdk 34
                  versionCode 5
                  versionName "5.0-Premium"
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.room:room-runtime:2.6.1'
              annotationProcessor 'androidx.room:room-compiler:2.6.1'
          }
          EOF

          # 2. Database Models (Strong Backend)
          cat << 'EOF' > app/src/main/java/com/zeeshan/chat/db/Message.java
          package com.zeeshan.chat.db;
          import androidx.room.*;
          @Entity(tableName = "messages")
          public class Message {
              @PrimaryKey(autoGenerate = true) public int id;
              public String sender;
              public String text;
              public long timestamp;
              public Message(String sender, String text) { this.sender = sender; this.text = text; this.timestamp = System.currentTimeMillis(); }
          }
          EOF
          
          cat << 'EOF' > app/src/main/java/com/zeeshan/chat/db/MessageDao.java
          package com.zeeshan.chat.db;
          import androidx.room.*;
          import java.util.List;
          @Dao
          public interface MessageDao {
              @Insert void insert(Message message);
              @Query("SELECT * FROM messages ORDER BY timestamp ASC") List<Message> getAllMessages();
              @Query("DELETE FROM messages") void deleteAll();
          }
          EOF
          
          cat << 'EOF' > app/src/main/java/com/zeeshan/chat/db/AppDatabase.java
          package com.zeeshan.chat.db;
          import androidx.room.*;
          @Database(entities = {Message.class}, version = 1)
          public abstract class AppDatabase extends RoomDatabase { public abstract MessageDao messageDao(); }
          EOF

          # 3. Premium UI Drawables (Chat Bubbles)
          cat << 'EOF' > app/src/main/res/drawable/bg_chat_me.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#E3FFC4"/>
              <corners android:topLeftRadius="24dp" android:topRightRadius="24dp" android:bottomLeftRadius="24dp" android:bottomRightRadius="4dp"/>
              <stroke android:width="1dp" android:color="#C5E1A5"/>
          </shape>
          EOF
          
          cat << 'EOF' > app/src/main/res/drawable/bg_input.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFFFFF"/>
              <corners android:radius="30dp"/>
              <stroke android:width="1dp" android:color="#B0BEC5"/>
          </shape>
          EOF

          # 4. Colorful Values (Themes)
          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="colorPrimary">#00897B</color>
              <color name="colorPrimaryDark">#00695C</color>
              <color name="colorAccent">#FFC107</color>
              <color name="chatBackground">#F5F5F5</color>
          </resources>
          EOF

          # 5. Pro Layouts
          cat << 'EOF' > app/src/main/res/layout/item_chat.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:orientation="vertical"
              android:padding="8dp">
              <LinearLayout android:id="@+id/bubble_layout"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_gravity="end"
                  android:background="@drawable/bg_chat_me"
                  android:padding="12dp"
                  android:elevation="2dp">
                  <TextView android:id="@+id/msg_text"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:textColor="#212121"
                      android:textSize="16sp"
                      android:textStyle="bold"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="@color/chatBackground">
              
              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/toolbar"
                  android:layout_width="match_parent"
                  android:layout_height="?attr/actionBarSize"
                  android:background="@color/colorPrimary"
                  android:elevation="8dp"
                  app:titleTextColor="#FFFFFF"
                  app:subtitleTextColor="#E0F2F1"
                  android:theme="@style/ThemeOverlay.AppCompat.Dark.ActionBar" />
                  
              <ListView android:id="@+id/chat_list"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:divider="@android:color/transparent"
                  android:dividerHeight="8dp"
                  android:padding="8dp"
                  android:clipToPadding="false"
                  android:transcriptMode="alwaysScroll"
                  android:stackFromBottom="true" />
                  
              <LinearLayout android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:padding="10dp"
                  android:gravity="bottom">
                  
                  <EditText android:id="@+id/msg_input"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:background="@drawable/bg_input"
                      android:hint="Type a message..."
                      android:padding="14dp"
                      android:maxLines="4"
                      android:elevation="2dp"/>
                      
                  <com.google.android.material.floatingactionbutton.FloatingActionButton
                      android:id="@+id/send_btn"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginStart="8dp"
                      android:src="@android:drawable/ic_menu_send"
                      app:backgroundTint="@color/colorPrimary"
                      app:tint="#FFFFFF"
                      app:fabSize="normal" />
              </LinearLayout>
          </LinearLayout>
          EOF

          # 6. Menu for Memory Management
          cat << 'EOF' > app/src/main/res/menu/main_menu.xml
          <menu xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto">
              <item android:id="@+id/clear_history" android:title="Delete All Chats" app:showAsAction="never" />
              <item android:id="@+id/clear_cache" android:title="Boost Phone (Clear MB)" app:showAsAction="never" />
          </menu>
          EOF

          # 7. Custom Adapter & Main Logic (The Brain)
          cat << 'EOF' > app/src/main/java/com/zeeshan/chat/MainActivity.java
          package com.zeeshan.chat;
          import android.content.Context;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.appcompat.widget.Toolbar;
          import androidx.room.Room;
          import com.zeeshan.chat.db.*;
          import java.io.File;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private ArrayList<Message> chatList = new ArrayList<>();
              private ChatAdapter adapter;
              private AppDatabase db;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  Toolbar toolbar = findViewById(R.id.toolbar);
                  setSupportActionBar(toolbar);
                  getSupportActionBar().setTitle("Aasan Chatting");
                  getSupportActionBar().setSubtitle("By Zeeshan Husain & Gemini");

                  db = Room.databaseBuilder(this, AppDatabase.class, "zeeshan_premium_db").allowMainThreadQueries().build();
                  
                  ListView listView = findViewById(R.id.chat_list);
                  adapter = new ChatAdapter(this, chatList);
                  listView.setAdapter(adapter);

                  loadChat();

                  findViewById(R.id.send_btn).setOnClickListener(v -> {
                      EditText input = findViewById(R.id.msg_input);
                      String text = input.getText().toString().trim();
                      if(!text.isEmpty()){
                          db.messageDao().insert(new Message("Me", text));
                          input.setText("");
                          loadChat();
                      }
                  });
              }

              private void loadChat() {
                  chatList.clear();
                  chatList.addAll(db.messageDao().getAllMessages());
                  adapter.notifyDataSetChanged();
              }

              @Override
              public boolean onCreateOptionsMenu(Menu menu) {
                  getMenuInflater().inflate(R.menu.main_menu, menu);
                  return true;
              }

              @Override
              public boolean onOptionsItemSelected(MenuItem item) {
                  if(item.getItemId() == R.id.clear_history) {
                      db.messageDao().deleteAll();
                      loadChat();
                      Toast.makeText(this, "History Saaf Ho Gayi!", Toast.LENGTH_SHORT).show();
                  } else if(item.getItemId() == R.id.clear_cache) {
                      try {
                          File dir = getCacheDir();
                          if (dir != null && dir.isDirectory()) deleteDir(dir);
                          Toast.makeText(this, "Phone Boosted!", Toast.LENGTH_SHORT).show();
                      } catch (Exception e) {}
                  }
                  return super.onOptionsItemSelected(item);
              }
              
              private boolean deleteDir(File dir) {
                  if (dir != null && dir.isDirectory()) {
                      for (String child : dir.list()) if (!deleteDir(new File(dir, child))) return false;
                  }
                  return dir.delete();
              }

              // Custom Adapter for Premium Bubbles
              class ChatAdapter extends ArrayAdapter<Message> {
                  public ChatAdapter(Context context, List<Message> messages) { super(context, 0, messages); }
                  @NonNull @Override
                  public View getView(int position, View convertView, @NonNull ViewGroup parent) {
                      if (convertView == null) convertView = LayoutInflater.from(getContext()).inflate(R.layout.item_chat, parent, false);
                      Message msg = getItem(position);
                      TextView txt = convertView.findViewById(R.id.msg_text);
                      txt.setText(msg.text);
                      return convertView;
                  }
              }
          }
          EOF

      # Yahan mene NAYA command add kiya hai jo aapke error ko theek karega
      - name: Generate Gradle Wrapper & Build Pro APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Husain-Pro-Chat
          path: app/build/outputs/apk/debug/app-debug.apk
