name: Build Z+3 Pulse AI Voice Pro (Final Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/zeeshan/pulse
          mkdir -p app/src/main/res/values

      - name: 3. Setup Error-Free Gradle Config
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { 
              repositories { google(); mavenCentral(); gradlePluginPortal() } 
          }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = "ZPulseAIVoice"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

      - name: 4. Write build.gradle (With Guava & CameraX)
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.pulse'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.pulse"
                  minSdk 24
                  targetSdk 34
                  versionCode 4
                  versionName "Z+3 AI Voice"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation "androidx.camera:camera-camera2:1.3.0"
              implementation "androidx.camera:camera-lifecycle:1.3.0"
              implementation "androidx.camera:camera-view:1.3.0"
              implementation 'com.google.guava:guava:31.1-android'
          }
          EOF

      - name: 5. Write MainActivity.java (AI + Voice + History)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/pulse/MainActivity.java
          package com.zeeshan.pulse;

          import android.Manifest;
          import android.content.SharedPreferences;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.camera.core.*;
          import androidx.camera.lifecycle.ProcessCameraProvider;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.google.common.util.concurrent.ListenableFuture;
          import java.nio.ByteBuffer;
          import java.text.SimpleDateFormat;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private TextView bpmText, aiText;
              private ArrayList<Long> beats = new ArrayList<>();
              private double lastRedAvg = 0;
              private TextToSpeech tts;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = getSharedPreferences("ZHistory", MODE_PRIVATE);
                  
                  // Voice Setup
                  tts = new TextToSpeech(this, status -> {
                      if(status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("hi", "IN"));
                  });

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.parseColor("#000000"));
                  root.setGravity(Gravity.CENTER);
                  root.setPadding(50, 50, 50, 50);

                  bpmText = new TextView(this);
                  bpmText.setText("--");
                  bpmText.setTextColor(Color.GREEN);
                  bpmText.setTextSize(110);
                  bpmText.setGravity(Gravity.CENTER);

                  aiText = new TextView(this);
                  aiText.setText("AI: Taiyar hain? Start dabayein.");
                  aiText.setTextColor(Color.CYAN);
                  aiText.setGravity(Gravity.CENTER);
                  aiText.setPadding(0, 20, 0, 40);

                  Button startBtn = new Button(this);
                  startBtn.setText("AI VOICE SCAN");
                  startBtn.setBackgroundColor(Color.RED);
                  startBtn.setTextColor(Color.WHITE);

                  Button histBtn = new Button(this);
                  histBtn.setText("HISTORY");
                  histBtn.setTextColor(Color.LTGRAY);

                  root.addView(bpmText); root.addView(aiText);
                  root.addView(startBtn); root.addView(histBtn);
                  setContentView(root);

                  startBtn.setOnClickListener(v -> {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 1);
                      } else { startCamera(); }
                  });

                  histBtn.setOnClickListener(v -> {
                      String data = prefs.getString("logs", "Koi history nahi hai.");
                      new AlertDialog.Builder(this).setTitle("Old Records").setMessage(data).show();
                  });
              }

              private void startCamera() {
                  ListenableFuture<ProcessCameraProvider> future = ProcessCameraProvider.getInstance(this);
                  future.addListener(() -> {
                      try {
                          ProcessCameraProvider provider = future.get();
                          ImageAnalysis analysis = new ImageAnalysis.Builder()
                              .setBackpressureStrategy(ImageAnalysis.STRATEGY_KEEP_ONLY_LATEST).build();
                          analysis.setAnalyzer(ContextCompat.getMainExecutor(this), image -> {
                              analyzePulse(image); image.close();
                          });
                          Camera cam = provider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, analysis);
                          cam.getCameraControl().enableTorch(true);
                          runOnUiThread(() -> aiText.setText("AI: Khoon ki gardish check ho rahi hai..."));
                      } catch (Exception e) {}
                  }, ContextCompat.getMainExecutor(this));
              }

              private void analyzePulse(ImageProxy image) {
                  ByteBuffer buffer = image.getPlanes()[0].getBuffer();
                  byte[] data = new byte[buffer.remaining()];
                  buffer.get(data);
                  double red = 0;
                  for (byte b : data) red += (b & 0xFF);
                  red /= data.length;

                  if (lastRedAvg > 0 && red < lastRedAvg * 0.9985) {
                      long now = System.currentTimeMillis();
                      if (beats.isEmpty() || now - beats.get(beats.size()-1) > 550) {
                          beats.add(now);
                          if (beats.size() > 6) {
                              long diff = beats.get(beats.size()-1) - beats.get(beats.size()-6);
                              int bpm = (int) (60000 * 5 / diff);
                              runOnUiThread(() -> updateUI(bpm));
                          }
                      }
                  }
                  lastRedAvg = red;
              }

              private void updateUI(int bpm) {
                  bpmText.setText(String.valueOf(bpm));
                  String msg = (bpm > 100) ? "Aapka BP high lag raha hai, araam karein." : "Aap bilkul normal hain.";
                  aiText.setText("AI Advice: " + msg);
                  if (beats.size() % 15 == 0) {
                      tts.speak("Aapki dharkan " + bpm + " beats per minute hai. " + msg, TextToSpeech.QUEUE_FLUSH, null, null);
                      String log = new SimpleDateFormat("HH:mm", Locale.getDefault()).format(new Date()) + ": " + bpm + " BPM\n";
                      prefs.edit().putString("logs", log + prefs.getString("logs", "")).apply();
                  }
              }
          }
          EOF

      - name: 6. Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 7. Upload Advanced AI Voice APK
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus3-AI-Voice-Pro
          path: app/build/outputs/apk/debug/*.apk
