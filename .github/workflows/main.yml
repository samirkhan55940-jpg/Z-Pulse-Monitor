name: Build Zeeshan Husain Smile Pro Calculator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 1. Setup App Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/calculator
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable

      - name: 2. Write Build & Config
        run: |
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.calculator'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.calculator'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-Voice-Premium"
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          cat << 'EOF' > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_color">#2C3333</color>
              <color name="btn_color">#395B64</color>
              <color name="text_color">#E7F6F2</color>
              <color name="accent_color">#F582A7</color>
          </resources>
          EOF

      - name: 3. Design Neumorphic Buttons
        run: |
          cat << 'EOF' > app/src/main/res/drawable/bg_button.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/btn_color"/>
              <corners android:radius="16dp"/>
              <stroke android:width="1dp" android:color="#5A7D8A"/>
          </shape>
          EOF

      - name: 4. Create UI Layout (All Buttons)
        run: |
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="@color/bg_color" android:padding="16dp">
              
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Zeeshan Husain Smile AI Calc" android:textColor="@color/accent_color"
                  android:textSize="14sp" android:textStyle="bold" android:gravity="center" android:padding="8dp"/>

              <TextView android:id="@+id/tv_display"
                  android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"
                  android:gravity="bottom|end" android:text="0" android:textColor="@color/text_color"
                  android:textSize="56sp" android:padding="16dp" android:maxLines="2" android:autoSizeTextType="uniform"/>

              <GridLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:columnCount="4" android:rowCount="5" android:useDefaultMargins="true" android:alignmentMode="alignBounds">
                  
                  <Button android:text="AC" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="(" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text=")" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="/" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="7" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="8" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="9" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="*" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="4" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="5" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="6" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="-" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="1" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="2" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="3" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="+" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/accent_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>

                  <Button android:text="0" android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnSpan="2" android:layout_columnWeight="2" android:layout_margin="4dp"/>
                  <Button android:text="." android:onClick="onButtonClick" android:background="@drawable/bg_button" android:textColor="@color/text_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
                  <Button android:text="=" android:onClick="onButtonClick" android:backgroundTint="@color/accent_color" android:textColor="@color/bg_color" android:layout_columnWeight="1" android:layout_margin="4dp"/>
              </GridLayout>
          </LinearLayout>
          EOF

      - name: 5. Write AndroidManifest
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <queries><intent><action android:name="android.intent.action.TTS_SERVICE" /></intent></queries>
              <application android:label="ZH Calc" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 6. Write Math Engine & Voice Logic (Java)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/calculator/MainActivity.java
          package com.zeeshan.calculator;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.View;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private TextToSpeech tts;
              private TextView display;
              private StringBuilder currentExpression = new StringBuilder();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  display = findViewById(R.id.tv_display);

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) tts.setLanguage(new Locale("en", "IN"));
                  });
              }

              public void onButtonClick(View view) {
                  Button button = (Button) view;
                  String btnText = button.getText().toString();

                  if (btnText.equals("AC")) {
                      currentExpression.setLength(0);
                      display.setText("0");
                  } else if (btnText.equals("=")) {
                      calculateResult();
                  } else {
                      if (display.getText().toString().equals("0") || display.getText().toString().equals("Error")) {
                          currentExpression.setLength(0);
                      }
                      currentExpression.append(btnText);
                      display.setText(currentExpression.toString());
                  }
              }

              private void calculateResult() {
                  try {
                      String mathExpression = currentExpression.toString();
                      double result = eval(mathExpression);
                      
                      // Remove decimal if it's a whole number
                      String finalResult = (result == (long) result) ? String.format(Locale.US, "%d", (long) result) : String.format(Locale.US, "%s", result);
                      
                      display.setText(finalResult);
                      currentExpression.setLength(0);
                      currentExpression.append(finalResult);

                      if (tts != null) {
                          tts.speak("Result is " + finalResult, TextToSpeech.QUEUE_FLUSH, null, null);
                      }
                  } catch (Exception e) {
                      display.setText("Error");
                      currentExpression.setLength(0);
                  }
              }

              // Simple Math Evaluator Logic
              private double eval(final String str) {
                  return new Object() {
                      int pos = -1, ch;
                      void nextChar() { ch = (++pos < str.length()) ? str.charAt(pos) : -1; }
                      boolean eat(int charToEat) {
                          while (ch == ' ') nextChar();
                          if (ch == charToEat) { nextChar(); return true; }
                          return false;
                      }
                      double parse() { nextChar(); double x = parseExpression(); if (pos < str.length()) throw new RuntimeException("Unexpected: " + (char)ch); return x; }
                      double parseExpression() {
                          double x = parseTerm();
                          for (;;) { if (eat('+')) x += parseTerm(); else if (eat('-')) x -= parseTerm(); else return x; }
                      }
                      double parseTerm() {
                          double x = parseFactor();
                          for (;;) { if (eat('*')) x *= parseFactor(); else if (eat('/')) x /= parseFactor(); else return x; }
                      }
                      double parseFactor() {
                          if (eat('+')) return parseFactor(); if (eat('-')) return -parseFactor();
                          double x;
                          int startPos = this.pos;
                          if (eat('(')) { x = parseExpression(); eat(')'); }
                          else if ((ch >= '0' && ch <= '9') || ch == '.') { while ((ch >= '0' && ch <= '9') || ch == '.') nextChar(); x = Double.parseDouble(str.substring(startPos, this.pos)); }
                          else { throw new RuntimeException("Unexpected: " + (char)ch); }
                          return x;
                      }
                  }.parse();
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  super.onDestroy();
              }
          }
          EOF

      - name: 7. Build Final APK
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug

      - name: 8. Upload Pro Calculator APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Husain-Smile-Voice-Calc
          path: app/build/outputs/apk/debug/app-debug.apk
