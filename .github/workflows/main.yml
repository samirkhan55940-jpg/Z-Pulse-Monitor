name: Build Z+3 Pulse Monitor (All-in-One Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment & JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Create Project Folders
        run: |
          mkdir -p app/src/main/java/com/zeeshan/pulse
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: 3. Setup Gradle Settings & Properties
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "ZPulseMonitor"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: 4. Write App Build Configurations
        run: |
          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.pulse'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zeeshan.pulse"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "Z+3 Pulse"
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1' 
          }
          EOF

      - name: 5. Write AndroidManifest (Permissions)
        run: |
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.FLASHLIGHT" />
              <uses-feature android:name="android.hardware.camera" />
              <uses-feature android:name="android.hardware.camera.flash" />
              
              <application android:label="Z+³ Pulse" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 6. Write MainActivity.java (No XML layout needed, UI in Java)
        run: |
          cat << 'EOF' > app/src/main/java/com/zeeshan/pulse/MainActivity.java
          package com.zeeshan.pulse;
          
          import android.Manifest;
          import android.content.Context;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.hardware.camera2.CameraManager;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;

          public class MainActivity extends AppCompatActivity {
              private CameraManager camManager;
              private String camId;
              private boolean isFlashOn = false;
              private TextView bpmText;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // App ka Design (Layout) yahi Java mein banaya hai taake code chota rahe
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  root.setGravity(Gravity.CENTER);
                  
                  TextView title = new TextView(this);
                  title.setText("Z+³ Pulse Monitor");
                  title.setTextColor(Color.parseColor("#00FF00")); // Green
                  title.setTextSize(26);
                  title.setGravity(Gravity.CENTER);
                  title.setPadding(0, 0, 0, 100);
                  
                  bpmText = new TextView(this);
                  bpmText.setText("-- BPM");
                  bpmText.setTextColor(Color.parseColor("#FF0000")); // Red
                  bpmText.setTextSize(60);
                  bpmText.setGravity(Gravity.CENTER);
                  bpmText.setPadding(0, 0, 0, 100);
                  
                  Button btn = new Button(this);
                  btn.setText("START SCAN");
                  btn.setBackgroundColor(Color.parseColor("#FF0000"));
                  btn.setTextColor(Color.WHITE);
                  btn.setTextSize(20);
                  
                  root.addView(title);
                  root.addView(bpmText);
                  root.addView(btn);
                  setContentView(root);
                  
                  camManager = (CameraManager) getSystemService(Context.CAMERA_SERVICE);
                  
                  btn.setOnClickListener(v -> {
                      if (ActivityCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA}, 100);
                      } else {
                          toggleTorch();
                      }
                  });
              }
              
              private void toggleTorch() {
                  try {
                      camId = camManager.getCameraIdList()[0];
                      if (!isFlashOn) {
                          camManager.setTorchMode(camId, true);
                          isFlashOn = true;
                          bpmText.setText("Scanning...");
                          Toast.makeText(this, "Ungli Camera Lens par rakhein!", Toast.LENGTH_LONG).show();
                      } else {
                          camManager.setTorchMode(camId, false);
                          isFlashOn = false;
                          bpmText.setText("-- BPM");
                      }
                  } catch (Exception e) { e.printStackTrace(); }
              }
              
              @Override
              protected void onPause() {
                  super.onPause();
                  if (isFlashOn) { toggleTorch(); } // App band hone par torch khud band ho jayegi
              }
          }
          EOF

      - name: 7. Generate Gradle Wrapper & Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug

      - name: 8. Upload Z+3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Pulse-App-V3
          path: app/build/outputs/apk/debug/*.apk
